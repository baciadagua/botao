<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>botão</title>
        <link rel="stylesheet" href="css/style.css">
        <body>
            <audio id="som" src="som/som.mp3"></audio>
            <div class="container">
                <h1 style="text-align: center;">CLIQUE NO BOTÃO</h1>
                <button onclick="tocarSom(); alert('Parabéns')">BOTÃO</button>
            </div>
            <script>
                function tocarSom(){
                    var som = document.getElementById("som");
                    som.play();
                }
            </script>
        </body>
    </head>
</html>
